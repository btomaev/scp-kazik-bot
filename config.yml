admin: 1139602557

start_balance: 1000
loan_value: 500

games:
  blackjack:
    min_players: 1
    max_players: 6 # Without dealer

localization:
  admin:
    chat_admitted: Чат одобрен для использования
    chat_denied: Чат попущен
    insufficient_reply: Ответьте командой на сообщение пользователя
    set_balance_successful: Баланс пользователя изменен
    set_debt_successful: Долг пользователя изменен

  dep:
    slot:
      deposit_required: |-
        Сначала сделайте ставку.
        /dep [ставка]
        /slot [ставка]
      win: |-
        Поздравляю, вы выиграли, ставка x5!
        Выигрыш: {deposit}
      jackpot: |-
        Джекпот! Ваша ставка x10!
        Выигрыш: {deposit}
      loss: |-
        Не повезло, ваш депозит сгорел.
        Попробуйте еще раз, фортуна точно будет на вашей стороне!
    empty_subject: Возвращайся когда у тебя будет что мне предложить
    insufficient_balance: Недостаточно средств, у вас на балансе {balance}
    non_positive_value: 🖕 (с уважением)
    accepted: 'Ваш депозит: {value}'
    invalid_subject: Я такое не принимаю
    loan:
      funds_available: У тебя и так есть деньги, иди отсюда, попрошайка.
      already_received: Я и так занимал тебе сегодня, иди отсюда, лудик несчастный.
      received: Сцедил тебе {loan_value} манесов

  blackjack:
    dealer_name: Дилер-хуилер
    room:
      make: Создать комнату для игры в блэкджек?
      waiting: |
        Собираем стол в блэкджек! #{room}
        Играют: {players}
      active:
        control:
          message: |
            Ваши действия?
            Сумма карт: {score}.
          waiting_other_players: Ждем ход {player}
          finished: "Игра завершена: {result}"
          unavailable: Не удалось отправить персональные контролы. Попробуйте еще раз.
    playtime:
      table_layout:
        body: |
          <h2>Блэкджек</h2>
          <p>{status}</p>
          <table bordered striped>
            <caption>Cтол #{room}</caption>
            {rows}
          </table>
        row: |
          <tr>
            <th>{player}</th>
            <th>{cards}</th>
            <th>{result}</th>
          </tr> 
      turn: "Ход игрока: {player}"
      finished: Игра завершена
      controls_btn: Мои действия
      hit_btn: Хит
      stand_btn: Стэнд
      state:
        waiting: Ждет
        playing: Играет
        stood: Стоп
        busted: Перебор
        blackjack: Блэкджек
      result:
        win: Победа
        lose: Поражение
        push: Ничья
        blackjack: Блэкджек

  rooms:
    make_btn: Создать
    start_btn: Начать
    exit_btn: Покинуть
    join_btn: Присоединиться ({joined_players}/{max_players})
    successful_joined: "Вы присоединились к комнате #{room}"
    successful_exited: "Вы покинули комнату #{room}"
    closed_due_to_no_players: "Комната #{room} удалена, так как в ней не осталось игроков"
    game_starting: Игра начинается...
    err_not_joined: Вы не состоите в этой комнате
    err_already_joined: Вы уже присоединились к этой комнате
    err_not_exists: Ошибка! Комнаты не существует
    err_too_many_players: В этой комнате слишком много игроков, присоединиться не получится
    err_cant_start: Вы не можете запустить эту комнату
    err_not_enough_players: Недостаточно игроков для начала игры
    err_cant_do_this_action: Вы не можете сделать это действие
    err_not_your_turn: Сейчас не ваш ход
    err_room_not_waiting: Комната уже запущена или закрыта
    err_game_not_active: Игра уже завершена или еще не началась
    err_deck_empty: В колоде закончились карты
    err_room_id_collision: Не удалось создать уникальную комнату

  start:
    welcome: |-
      Добро пожаловать в аномальный казик.
      Тебе начислен приветственный бонус: {start_balance}!

  state:
    balance: |-
      Ваш баланс: {balance}
      Текущий депозит: {deposit}
      Ваш долг: {debt}
    stats: |-
      <b>📊 Общая статистика</b>
      Игр: {total_play}
      Побед: {total_wins}
      Поражений: {total_losses}
      Ничьих: {total_pushes}
      Винрейт: {total_win_rate}%

      <b>🎰 Слоты</b>
      Игр: {total_slot_play}
      Побед: {total_slot_wins}
      Поражений: {total_slot_losses}
      Винрейт: {total_slot_win_rate}%
      Выиграно: {total_slot_earned}
      Проиграно: {total_slot_lost}

      <b>🃏 Блэкджек</b>
      Партий: {total_blackjack_play}
      Побед: {total_blackjack_wins}
      Поражений: {total_blackjack_losses}
      Ничьих: {total_blackjack_pushes}
      Блэкджеков с раздачи: {total_blackjacks}
      Винрейт: {total_blackjack_win_rate}%

  system:
    critical_error: Произошла критическая ошибка!
    err_too_many_stickers: Вы лудили слишком часто, казик накрыли менты, ставка не возвращается.
    err_message_inaccessible: Ошибка, сообщение недоступно
    err_not_your_button: Эта кнопка предназначена не вам
